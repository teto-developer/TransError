name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install package and dev deps
        run: |
          pip install .
          # optional: install lint tools
          pip install flake8 mypy

      - name: Import smoke test
        run: |
          python - << 'EOF'
          try:
              import error_translator
              print("Import OK")
          except Exception as e:
              print("Import failed:", e)
              exit(1)
          EOF

      - name: Lint (optional)
        run: |
          flake8 src/

      - name: Type Check (optional)
        run: |
          mypy src/
